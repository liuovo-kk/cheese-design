name: Cheese Design CI/CD Pipeline

# 触发条件：当你 push 代码到 main 分支，或者提 PR 时触发
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 极其关键：给这个 Action 赋予推送代码到 gh-pages 分支的写权限
permissions:
  contents: write

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest # 在云端分配一台极其纯净的 Linux 虚拟机

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # 统一使用 pnpm，极其契合你们的 Monorepo 架构

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装所有依赖
        run: pnpm install

      - name: 运行单元测试
        run: pnpm --filter ./packages/components run test
        # 如果这里报错，流水线会极其强硬地中断，绝不把有 Bug 的代码发布出去！

      - name: 构建 Storybook 静态文档
        run: pnpm --filter ./packages/docs run build-storybook
        # 注意：这里默认你在根目录或者有全局脚本能运行打包
        # 默认打包出来的静态文件通常在一个叫 storybook-static 的文件夹里

      - name: 自动部署到 GitHub Pages
        # 极其严谨的判断：只有在 push 到主分支，且上面步骤全成功时才部署
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/docs/storybook-static
